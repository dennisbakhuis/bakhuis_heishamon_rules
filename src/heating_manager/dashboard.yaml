# All sensor entities follow the heishamon_* naming convention
# defined in sensors.yaml. The only exceptions are the
# input_select/input_number controls from heishamon.yaml
# (quiet mode, heat mode, shifts).
# To adapt to a different MQTT prefix, edit sensors.yaml only.
#
# ============================================================
# Heating Manager — Home Assistant Lovelace Dashboard
# For Panasonic Aquarea via HeishaMon
#
# Three views:
#   1. Monitor  — live status, temperatures, power, operational stats
#   2. Analysis — WAR curve, RTC, soft-start breakdown, setpoint history
#   3. Settings — room setpoint slider, direct HP controls, MQTT diagnostics
#
# Built-in cards only — no HACS / custom cards required.
# See README.md for installation instructions.
#
# All entity IDs use the heishamon_* naming convention defined in
# sensors.yaml. To change the MQTT base topic, edit sensors.yaml only.
#
# Template sensors required for View 2 are in sensors.yaml.
# Input helpers required for View 3 are in helpers.yaml.
# ============================================================

title: Heating Manager
views:

  # ============================================================
  # VIEW 1 — MONITOR
  # Live operational overview: status, temperatures, power, stats.
  # ============================================================
  - title: Monitor
    path: monitor
    icon: mdi:heat-pump
    badges: []
    cards:

      # ----------------------------------------------------------
      # SECTION 0 — MASTER ON/OFF SWITCH
      # Digital equivalent of the on/off button on the HP panel.
      # Publishes directly to SetHeatpump (0=off, 1=on) via MQTT.
      # The rules continue running when the HP is off — they only
      # control setpoint and pump duty, which the HP ignores while off.
      # Requires the MQTT switch defined in sensors.yaml.
      # ----------------------------------------------------------
      - type: vertical-stack
        cards:
          - type: entities
            title: Heat Pump Power
            show_header_toggle: false
            entities:
              - entity: switch.heishamon_heatpump
                name: Heat Pump On/Off
                icon: mdi:power

          - type: markdown
            content: >
              > Toggling this switch sends a direct on/off command to the heat pump —
              > the same as pressing the on/off button on the physical controller.
              > The HeishaMon rules keep running in the background regardless of this state.

      # ----------------------------------------------------------
      # SECTION 1 — STATUS BAR
      # Quick at-a-glance indicators across the top.
      # Shows whether the pump is running, current operating mode,
      # defrost activity, quiet mode, and compressor load.
      # ----------------------------------------------------------
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## 🌡️ Heat Pump Status"

          - type: horizontal-stack
            cards:

              # HP on/off state
              - type: entity
                entity: sensor.heishamon_heatpump_state
                name: HP State
                icon: mdi:power

              # Operating mode (Heat / DHW / Heat+DHW / etc.)
              - type: entity
                entity: sensor.heishamon_operating_mode
                name: Mode
                icon: mdi:cog-outline

              # Defrost state — visually stands out when active
              - type: entity
                entity: sensor.heishamon_defrosting_state
                name: Defrost
                icon: mdi:snowflake-melt

              # Quiet mode level (Off / 1 / 2 / 3 / Scheduled)
              - type: entity
                entity: sensor.heishamon_quiet_mode
                name: Quiet Mode
                icon: mdi:volume-off

              # Compressor frequency — proxy for how hard the HP is working
              - type: entity
                entity: sensor.heishamon_compressor_freq
                name: Compressor
                icon: mdi:sine-wave

          # Defrost alert banner — only visible when defrost is active
          - type: conditional
            conditions:
              - entity: sensor.heishamon_defrosting_state
                state: Active
            card:
              type: markdown
              content: >
                ⚠️ **Defrost cycle active** — heat output is temporarily reduced.

      # ----------------------------------------------------------
      # SECTION 2 — TEMPERATURE OVERVIEW
      # Current measured temperatures across the system.
      # Room temperature and setpoint require MQTT sensors —
      # see sensors.yaml for setup.
      # ----------------------------------------------------------
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## 🌡️ Temperatures"

          - type: glance
            title: Current Temperatures
            columns: 3
            entities:
              - entity: sensor.heishamon_outside_temp
                name: Outdoor
                icon: mdi:thermometer

              - entity: sensor.heishamon_outside_pipe_temp
                name: Outside Pipe
                icon: mdi:pipe

              - entity: sensor.heishamon_inlet_temp
                name: Inlet
                icon: mdi:thermometer-water

              - entity: sensor.heishamon_outlet_temp
                name: Outlet
                icon: mdi:thermometer-high

              - entity: sensor.heishamon_z1_heat_request
                name: Z1 Target
                icon: mdi:target

              - entity: sensor.heishamon_z1_water_temp
                name: Z1 Water
                icon: mdi:water-thermometer

              # Room temp / setpoint — requires MQTT sensors from sensors.yaml
              - entity: sensor.heishamon_room_temp
                name: Room Temp
                icon: mdi:home-thermometer

              - entity: sensor.heishamon_room_setpoint_received
                name: Room Setpoint
                icon: mdi:home-thermometer-outline

      # ----------------------------------------------------------
      # SECTION 3 — TEMPERATURE HISTORY (24h)
      # Built-in history-graph — no dependencies needed.
      # ----------------------------------------------------------
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## 📈 Temperature History (24h)"

          - type: history-graph
            title: Temperature Trends
            hours_to_show: 24
            refresh_interval: 60
            entities:
              - entity: sensor.heishamon_outlet_temp
                name: Outlet
              - entity: sensor.heishamon_inlet_temp
                name: Inlet
              - entity: sensor.heishamon_outside_temp
                name: Outdoor
              - entity: sensor.heishamon_z1_heat_request
                name: Z1 Heat Request

      # ----------------------------------------------------------
      # SECTION 4 — POWER & EFFICIENCY
      # Heat power produced and consumed, live COP, power history.
      #
      # COP = Coefficient of Performance = heat_out / electricity_in
      # COP 3.0 = 3 kWh of heat per 1 kWh of electricity consumed.
      # ----------------------------------------------------------
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## ⚡ Power & Efficiency"

          - type: glance
            title: Power Now
            columns: 3
            entities:
              - entity: sensor.heishamon_heat_power_produced
                name: Heat Produced
                icon: mdi:radiator

              - entity: sensor.heishamon_heat_power_consumed
                name: Electricity In
                icon: mdi:lightning-bolt

              - entity: sensor.heishamon_heat_cop
                name: COP (heat)
                icon: mdi:fire

          - type: markdown
            title: Live Efficiency
            content: >
              ### COP (Heat only): {{ states('sensor.heishamon_heat_cop') }} ×

              > _COP > 3 is good for floor heating. COP > 4 is excellent._

          - type: history-graph
            title: Power History (24h)
            hours_to_show: 24
            refresh_interval: 60
            entities:
              - entity: sensor.heishamon_heat_power_produced
                name: Heat Produced (W)
              - entity: sensor.heishamon_heat_power_consumed
                name: Heat Consumed (W)

      # ----------------------------------------------------------
      # SECTION 5 — OPERATIONAL STATS
      # Lifetime and current-session counters for compressor and pump.
      # Useful for maintenance planning and wear tracking.
      # ----------------------------------------------------------
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## 📊 Operational Stats"

          - type: entities
            title: Compressor & Pump
            entities:
              - entity: sensor.heishamon_operating_hours
                name: Compressor Operating Hours
                icon: mdi:clock-outline

              - entity: sensor.heishamon_start_stop_counter
                name: Compressor Starts / Stops
                icon: mdi:counter

              - entity: sensor.heishamon_pump_flow
                name: Pump Flow
                icon: mdi:water-pump

              - entity: sensor.heishamon_pump_speed
                name: Pump Speed
                icon: mdi:speedometer

              - type: divider

              - entity: sensor.heishamon_fan1_speed
                name: Fan 1 Speed
                icon: mdi:fan

              - entity: sensor.heishamon_fan2_speed
                name: Fan 2 Speed
                icon: mdi:fan

              - entity: sensor.heishamon_compressor_current
                name: Compressor Current
                icon: mdi:current-ac

              - entity: sensor.heishamon_last_error
                name: Last Error Code
                icon: mdi:alert-circle-outline


  # ============================================================
  # VIEW 2 — ANALYSIS
  # Breaks down the setpoint computation: WAR curve, RTC correction,
  # and soft-start ramp. Template sensors from sensors.yaml required.
  # ============================================================
  - title: Analysis
    path: analysis
    icon: mdi:chart-line
    badges: []
    cards:

      # ----------------------------------------------------------
      # SECTION A — WAR CURVE ANALYSIS
      # Weather Adaptive Regulation: outdoor temp → water setpoint.
      # Compare WAR-only setpoint vs what the rules actually sent.
      # Net shift = effect of RTC + soft-start + min-freq combined.
      # ----------------------------------------------------------
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## 🌤️ Weather Compensation (WAR) Analysis"

          - type: entities
            title: WAR Setpoint vs Actual
            entities:
              - entity: sensor.heishamon_outside_temp
                name: Outdoor Temperature (WAR input)
                icon: mdi:thermometer-chevron-up

              - entity: sensor.heishamon_war_setpoint
                name: WAR Setpoint (curve only)
                icon: mdi:chart-bell-curve

              - entity: sensor.heishamon_z1_heat_request
                name: Actual Z1 Request (sent by rules)
                icon: mdi:target

              - entity: sensor.heishamon_net_shift
                name: Net Shift (actual − WAR)
                icon: mdi:delta

          # Dynamic markdown explaining the current WAR state
          - type: markdown
            content: >
              ### Weather Curve Analysis

              Outdoor: **{{ states('sensor.heishamon_outside_temp') }}°C**

              WAR setpoint: **{{ states('sensor.heishamon_war_setpoint') }}°C**

              Actual Z1 request: **{{ states('sensor.heishamon_z1_heat_request') }}°C**

              Net shift: **{{ (states('sensor.heishamon_z1_heat_request') | float(0) - states('sensor.heishamon_war_setpoint') | float(0)) | round(1) }}°C**

              > Shift > 0 = min-freq boost or cold compensation active.
              > Shift < 0 = RTC reducing heat (room is warm) or soft-start ramp.

      # ----------------------------------------------------------
      # SECTION B — RTC ANALYSIS
      # Room Temperature Control: how far room is from setpoint,
      # and which correction step the rules table selects.
      # ----------------------------------------------------------
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## 🏠 Room Temperature Control (RTC) Analysis"

          - type: entities
            title: RTC Inputs & Correction
            entities:
              - entity: sensor.heishamon_room_temp
                name: Room Temperature (measured)
                icon: mdi:home-thermometer

              - entity: sensor.heishamon_room_setpoint_received
                name: Room Setpoint (target)
                icon: mdi:home-thermometer-outline

              - entity: sensor.heishamon_rtc_delta
                name: RTC Delta (room − setpoint)
                icon: mdi:delta

              - entity: sensor.heishamon_rtc_correction
                name: RTC Correction Applied
                icon: mdi:thermometer-plus-outline

          # Dynamic markdown for RTC state
          - type: markdown
            content: >
              ### Room Temperature Control

              Room: **{{ states('sensor.heishamon_room_temp') }}°C**
              vs setpoint **{{ states('sensor.heishamon_room_setpoint_received') }}°C**

              Delta: **{{ states('sensor.heishamon_rtc_delta') }}°C**

              RTC correction: **{{ states('sensor.heishamon_rtc_correction') }}°C**

              > Positive delta = room is warmer than target → RTC reduces setpoint.
              > Negative delta = room is cooler → RTC increases setpoint.
              >
              > Dead band: −0.2 to +0.5°C → correction = 0 (no change).

      # ----------------------------------------------------------
      # SECTION C — SOFT-START ANALYSIS
      # When compressor starts cold (outdoor ≤ 8°C), setpoint is
      # temporarily boosted and then ramped down over 780 seconds.
      # Progress is tracked via input_datetime.heishamon_compressor_start_time.
      # ----------------------------------------------------------
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## 🚀 Soft-Start Ramp Analysis"

          - type: entities
            title: Soft-Start Status
            entities:
              - entity: sensor.heishamon_compressor_freq
                name: Compressor Frequency (live)
                icon: mdi:sine-wave

              - entity: sensor.heishamon_compressor_run_seconds
                name: Compressor Running (seconds)
                icon: mdi:timer-outline

              - entity: sensor.heishamon_softstart_progress
                name: Soft-Start Ramp Progress
                icon: mdi:progress-clock

              - entity: sensor.heishamon_softstart_shift
                name: Soft-Start Shift (°C)
                icon: mdi:thermometer-chevron-down

          # Dynamic soft-start status markdown
          - type: markdown
            content: >
              ### Soft-Start Status

              {% set secs = states('sensor.heishamon_compressor_run_seconds') | float(0) %}
              {% set mins = (secs / 60) | round(1) %}
              {% set progress = states('sensor.heishamon_softstart_progress') | float(0) %}
              {% set shift = states('sensor.heishamon_softstart_shift') | float(0) %}
              {% set outdoor = states('sensor.heishamon_outside_temp') | float(99) %}
              {% set freq = states('sensor.heishamon_compressor_freq') | float(0) %}

              {% if outdoor > 8 %}
              Outdoor temperature is **{{ outdoor }}°C** — soft-start only activates below 8°C.
              **Status: Inactive (warm outdoor)**
              {% elif freq <= 10 %}
              Compressor is **off** (frequency {{ freq }} Hz).
              **Status: Inactive (compressor stopped)**
              {% elif progress >= 100 %}
              Ramp complete — compressor has been running for **{{ mins }} min**.
              **Status: Complete (no shift applied)**
              {% else %}
              Compressor running for **{{ mins }} min** ({{ secs | int }} seconds).

              Ramp progress: **{{ progress }}%** of 780 s

              Current soft-start shift: **{{ shift }}°C**

              **Status: Active 🚀**
              {% endif %}

              > Soft-start adds up to +5°C at startup and ramps to 0 over 13 min.
              > Only active when outdoor temp ≤ 8°C.

      # ----------------------------------------------------------
      # SECTION D — COMBINED SETPOINT HISTORY (24h)
      # Overlay WAR baseline, actual Z1 request, and HP-confirmed
      # target to see how shifts move the setpoint over time.
      # ----------------------------------------------------------
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## 📈 Combined Setpoint History (24h)"

          - type: history-graph
            title: WAR vs Actual vs HP Confirmed
            hours_to_show: 24
            refresh_interval: 60
            entities:
              - entity: sensor.heishamon_war_setpoint
                name: WAR Setpoint (curve only)
              - entity: sensor.heishamon_z1_heat_request
                name: Z1 Heat Request (rules output)
              - entity: sensor.heishamon_target_temp
                name: Main Target (HP confirmed)

          - type: markdown
            content: >
              > **WAR Setpoint** — what pure weather compensation would produce.
              >
              > **Z1 Heat Request** — what the HeishaMon rules actually sent (WAR + RTC + soft-start + min-freq).
              >
              > **Main Target** — what the heat pump confirmed as its operating target.
              >
              > Gap between WAR and Z1 Request = combined shift. Gap between Z1 Request and Main Target = HP response lag.


  # ============================================================
  # VIEW 3 — SETTINGS
  # Room setpoint slider, HP direct controls, feature status,
  # MQTT diagnostics.
  # ============================================================
  - title: Settings
    path: settings
    icon: mdi:cog
    badges: []
    cards:

      # ----------------------------------------------------------
      # SECTION A — ROOM SETPOINT CONTROL
      # Slider for the RTC room temperature target.
      # HA automation publishes this to HeishaMon via MQTT.
      # ----------------------------------------------------------
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## 🏠 Room Setpoint (RTC Target)"

          - type: entities
            title: Room Temperature Target
            entities:
              - entity: input_number.heishamon_room_setpoint_target
                name: Room Setpoint
                icon: mdi:home-thermometer-outline

          - type: markdown
            content: >
              This is the **room temperature target** used by the RTC (Room Temperature Control) logic.

              Changing this slider will immediately publish the new setpoint to HeishaMon via MQTT
              (via the **HeishaMon: Sync room temperature to RTC** automation).

              The HeishaMon rules will then adjust the heat pump water setpoint up or down
              based on how far the actual room temperature is from this target.

              > Typical value: **21°C**. Range: 15–25°C in 0.5°C steps.

      # ----------------------------------------------------------
      # SECTION B — HEISHAMON DIRECT CONTROLS
      # Exposed input helpers from heishamon.yaml — these publish
      # directly to HeishaMon MQTT when changed in HA.
      # ----------------------------------------------------------
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## 🔧 HeishaMon Direct Controls"

          - type: entities
            title: Heat Pump Controls
            entities:
              # Quiet mode — reduces noise at the cost of efficiency
              - entity: input_select.heishamon_quietmode
                name: Quiet Mode
                icon: mdi:volume-off

              # Heat mode — controls operating mode (compensation curve, etc.)
              - entity: input_select.heishamon_heatmode
                name: Heat Mode
                icon: mdi:fire

              - type: divider

              # Manual Z1 heat shift — adds/subtracts from setpoint directly
              - entity: input_number.heishamon_heatshift_z1
                name: Z1 Heat Shift (manual offset)
                icon: mdi:tune

              # DHW target temperature
              - entity: input_number.heishamon_tank_temp
                name: DHW Target Temperature
                icon: mdi:water-boiler

          - type: markdown
            content: >
              > Changes to these controls are published to HeishaMon via MQTT automations
              > defined in `heishamon.yaml`. The heat pump responds within one polling cycle (~10s).

      # ----------------------------------------------------------
      # SECTION C — SYSTEM PREREQUISITES CHECK
      # Verifies that HeishaMon and HP settings are configured
      # correctly for the rules to work as expected.
      # Three settings are readable from MQTT; OpenTherm status
      # must be inferred from whether room temp data is arriving.
      # ----------------------------------------------------------
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## ✅ System Prerequisites Check"

          - type: entities
            title: Heat Pump Settings (read from HP via HeishaMon)
            show_header_toggle: false
            entities:
              # Heating Mode: must be 1 (Direct) for rules to set absolute water temps.
              # If 0 (Compensation Curve), the HP treats the setpoint as a curve offset
              # and WAR will not behave as expected.
              - entity: sensor.heishamon_heating_mode
                name: "Heating Mode  (required: Direct = 1)"
                icon: mdi:thermometer-check

              # Z1 Sensor Setting: must be 0 (Water sensor) for direct temperature control.
              # If set to thermostat mode, direct setpoints are ignored.
              - entity: sensor.heishamon_z1_sensor_settings
                name: "Z1 Sensor  (required: Water = 0)"
                icon: mdi:water-thermometer

              # Pump Flowrate Mode: 0 (DeltaT) recommended for pump duty control.
              - entity: sensor.heishamon_pump_flowrate_mode
                name: "Pump Flowrate Mode  (recommended: DeltaT = 0)"
                icon: mdi:pump

          - type: markdown
            content: >
              ### How to read this

              | Setting | Required value | Why |
              |---------|---------------|-----|
              | Heating Mode | **1 = Direct** | Rules write absolute water temperatures. In compensation curve mode (0) the HP interprets setpoints as offsets — WAR will not work correctly. |
              | Z1 Sensor | **0 = Water** | Direct temperature control requires a water sensor on Z1. Thermostat modes ignore the setpoint written by the rules. |
              | Pump Flowrate | **0 = DeltaT** | Pump duty control works best in DeltaT mode. In maximum-flow mode (1, J-series only) pump duty commands may have no effect. |

              ### OpenTherm (required for RTC)

              OpenTherm status is **not published to MQTT** — it cannot be checked automatically.
              Verify it manually:

              1. HeishaMon web UI → **Settings** → confirm **OpenTherm** is enabled
              2. After enabling, run the **HeishaMon: Sync room temperature** automation once manually
              3. Check `sensor.heishamon_room_temp` below — if it shows a value, OpenTherm is working

          - type: entities
            title: OpenTherm / RTC Status (inferred)
            show_header_toggle: false
            entities:
              # If this sensor has a value, OpenTherm is enabled and HA → HeishaMon RTC path works.
              # If unavailable, check HeishaMon Settings → OpenTherm and rerun the sync automation.
              - entity: sensor.heishamon_room_temp
                name: "Room Temp received by HeishaMon  (must have value for RTC)"
                icon: mdi:home-thermometer

              - entity: sensor.heishamon_room_setpoint_received
                name: "Room Setpoint received by HeishaMon  (must have value for RTC)"
                icon: mdi:home-thermometer-outline

          - type: markdown
            content: >
              > **To change HP settings:** use the HeishaMon web UI or the HA controls below.
              > Heating Mode and Z1 Sensor are configured in the HP's service menu or via
              > HeishaMon's **SetHeatMode** / **SetCurves** commands.

      # ----------------------------------------------------------
      # SECTION D — FEATURE STATUS (read-only)
      # Feature flags are set in the HeishaMon rules file — they
      # cannot be toggled from HA. This card explains what's active.
      # ----------------------------------------------------------
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## ⚙️ HeishaMon Rule Features"

          - type: markdown
            content: |
              ### HeishaMon Rule Features

              These features are configured in the HeishaMon rules file.
              To enable/disable, update the rules and redeploy.

              | Feature | Setting |
              |---------|---------|
              | Weather Compensation (WAR) | Always on |
              | Min-Freq Control | `#enableMinFreq` in rules |
              | Room Temp Control (RTC) | `#enableRTC` in rules |
              | Soft-Start | `#enableSoftStart` in rules |

              > Edit `src/rules/heating_manager.rules` in the HeishaMon config repo,
              > then flash/upload to your HeishaMon device to change these settings.

      # ----------------------------------------------------------
      # SECTION E — MQTT DIAGNOSTICS
      # Verify HeishaMon is alive and publishing data to MQTT.
      # If sensors stop updating, check the HeishaMon device first.
      # ----------------------------------------------------------
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## 📡 MQTT Diagnostics"

          - type: entities
            title: Last Data From HeishaMon
            show_header_toggle: false
            entities:
              # These entities show when HeishaMon last published.
              # If they haven't updated in >5 minutes, check MQTT.
              - entity: sensor.heishamon_outside_temp
                name: Outdoor Temp (last update)
                icon: mdi:thermometer

              - entity: sensor.heishamon_compressor_freq
                name: Compressor Freq (last update)
                icon: mdi:sine-wave

              - entity: sensor.heishamon_z1_heat_request
                name: Z1 Heat Request (last update)
                icon: mdi:target

              - entity: sensor.heishamon_room_temp
                name: Room Temp (MQTT echo, last update)
                icon: mdi:home-thermometer

          - type: markdown
            content: >
              ### How to verify MQTT is working

              1. Check that the entities above have recent **last changed** timestamps.
              2. In HA → **Developer Tools → MQTT**, subscribe to `panasonic_heat_pump/#`
                 and confirm messages arrive every ~10 seconds.
              3. If no messages: check your HeishaMon device is online and the MQTT broker
                 (Mosquitto) is running. Restart the HeishaMon device if needed.
              4. If room temp sensors are stale: verify the **HeishaMon: Sync room temperature**
                 automation is enabled and has run recently.

              > HeishaMon publishes all heat pump data every ~10 seconds via MQTT.
              > The HA integration polls these topics and updates sensor states in near real-time.
