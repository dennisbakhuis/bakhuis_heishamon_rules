# ============================================================
# helpers.yaml — Input Helper Definitions
# for Heating Manager Dashboard
#
# INSTRUCTIONS:
#   Add the blocks below to your Home Assistant configuration.
#
#   Option A (recommended): Paste directly into configuration.yaml
#     under the relevant top-level keys (input_select, input_number,
#     input_datetime).
#
#   Option B: If you use separate include files, paste into
#     input_select.yaml, input_number.yaml, and input_datetime.yaml
#     respectively.
#
#   After adding, restart Home Assistant (or reload input helpers
#   via Settings → System → Restart → Quick Reload).
#
# NOTE: This file contains only user-configurable input helpers.
# The MQTT switch (switch.heishamon_heatpump) and all MQTT sensors
# (including template sensors) are defined in sensors.yaml.
#
# See README.md for full installation instructions.
# ============================================================


# ============================================================
# INPUT_SELECT — Dropdown selectors
#
# Paste under `input_select:` in configuration.yaml
# ============================================================

input_select:

  # Quiet mode selector — controls fan/compressor noise level.
  # Changing this triggers the "HeishaMon: Set Quiet Mode" automation
  # (see automations.yaml) which publishes to:
  #   panasonic_heat_pump/commands/SetQuietMode
  heishamon_quiet_mode:
    name: "Quiet Mode"
    options:
      - "Off"
      - "Level 1 (less power)"
      - "Level 2 (even less power)"
      - "Level 3 (least power)"
    icon: mdi:volume-off
    initial: "Off"

  # Operation mode selector — controls what the HP is doing.
  # Changing this triggers the "HeishaMon: Set Operation Mode" automation
  # (see automations.yaml) which publishes to:
  #   panasonic_heat_pump/commands/SetOperationMode
  heishamon_operation_mode:
    name: "Operation Mode"
    options:
      - "Heat only"
      - "Cool only"
      - "Auto"
      - "DHW only"
      - "Heat+DHW"
      - "Cool+DHW"
      - "Auto+DHW"
    icon: mdi:heat-pump
    initial: "Heat+DHW"


# ============================================================
# INPUT_NUMBER — Numeric sliders and inputs
#
# Paste under `input_number:` in configuration.yaml
# ============================================================

input_number:

  # Room temperature setpoint used by the RTC automation.
  # This value is published to HeishaMon via MQTT each time it changes
  # and every 5 minutes as a keepalive (see automations.yaml).
  # The HeishaMon rules read it from: panasonic_heat_pump/opentherm/read/roomTempSet
  heishamon_room_setpoint_target:
    name: "Room Setpoint (RTC)"
    min: 15
    max: 25
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:home-thermometer-outline
    initial: 21

  # DHW (domestic hot water) tank target temperature.
  # Changing this triggers the "HeishaMon: Set DHW Temperature" automation
  # (see automations.yaml) which publishes to:
  #   panasonic_heat_pump/commands/SetDHWTemp
  heishamon_dhw_temp:
    name: "DHW Target Temperature"
    min: 40
    max: 75
    step: 1
    unit_of_measurement: "°C"
    icon: mdi:water-thermometer
    initial: 52


# ============================================================
# INPUT_DATETIME — Date/time inputs
#
# Paste under `input_datetime:` in configuration.yaml
# ============================================================

input_datetime:

  # Timestamp of when the compressor last started.
  # Set automatically by the "HeishaMon: Track compressor start time"
  # automation (see automations.yaml) when compressor frequency rises
  # above 10 Hz.
  # Used by the soft-start template sensors in sensors.yaml to compute
  # elapsed run time and the current soft-start shift.
  heishamon_compressor_start_time:
    name: "Heishamon Compressor Start Time"
    has_date: true
    has_time: true
