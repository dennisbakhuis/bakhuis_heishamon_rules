#     sensor:
#       ...
#
# If you already have an `mqtt:` key, merge the switch: and
# sensor: lists into your existing block.
#
# To use a different MQTT base topic (e.g. my_heat_pump),
# replace "panasonic_heat_pump" everywhere in this section.
