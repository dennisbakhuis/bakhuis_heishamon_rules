# ============================================================
# NOTES
#
# If you are using the full heishamon.yaml integration package,
# the following sensors are already defined for you:
#
#   sensor.heishamon_cop            Combined COP
#   sensor.heishamon_heat_cop       Heat-only COP
#   sensor.heishamon_dhw_cop        DHW-only COP
#   sensor.heishamon_cool_cop       Cool-only COP
#   sensor.heishamon_power_produced Combined power produced (W)
#   sensor.heishamon_power_consumed Combined power consumed (W)
#
# The dashboard uses these entity IDs. If your instance uses
# different IDs, update dashboard.yaml accordingly.
# ============================================================
