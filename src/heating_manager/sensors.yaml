# ============================================================
# sensors.yaml — All Sensor Definitions for Heating Manager
#
# INSTRUCTIONS:
#   Two blocks below need to be added to configuration.yaml:
#
#   1. MQTT SENSORS (switch + sensors) — add under `mqtt:` in configuration.yaml
#   2. TEMPLATE SENSORS               — add under `template:` → `sensor:`
#
#   Then restart Home Assistant (or reload template sensors
#   via Developer Tools → YAML → Template entities).
#
# All MQTT topics follow the pattern: {mqtt_base}/{topic}
# Default mqtt_base: panasonic_heat_pump
# To use a different base topic, change the prefix in all
# state_topic / command_topic / state_topic values below.
# topics.yaml documents every topic for reference.
#
# See README.md for full step-by-step installation guide.
# ============================================================


