# ============================================================
# MQTT SENSORS (Room temperature for RTC via OpenTherm)
#
# Add these under the existing `mqtt:` block in configuration.yaml,
# inside the `sensor:` list. If you don't have an `mqtt:` block yet,
# create one:
#
#   mqtt:
#     sensor:
#       - name: ...
#
# These sensors read the room temperature and setpoint that HA
# publishes to HeishaMon via MQTT (see automations.yaml).
# The topics below are HeishaMon's OpenTherm write topics.
# ============================================================

# Paste into configuration.yaml → mqtt: → sensor:
#
# - name: "Heishamon Room Temperature"
#   unique_id: heishamon_room_temperature
#   state_topic: "panasonic_heat_pump/opentherm/write/roomTemp"
#   unit_of_measurement: "°C"
#   device_class: temperature
#   state_class: measurement
#   # HA publishes to this topic via the RTC automation (see automations.yaml)
#
# - name: "Heishamon Room Setpoint"
#   unique_id: heishamon_room_setpoint
#   state_topic: "panasonic_heat_pump/opentherm/write/roomTempSet"
#   unit_of_measurement: "°C"
#   device_class: temperature
#   state_class: measurement
#   # HA publishes to this topic via the RTC automation (see automations.yaml)


